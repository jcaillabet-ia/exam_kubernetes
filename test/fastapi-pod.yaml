apiVersion: v1
kind: Pod
metadata:
  name: fastapi
  namespace: eval
  labels:
    app: fastapi
spec:
  containers:
  - name: fastapi
    image: jcaillabet/k8s-dst-eval-fastapi:latest
    ports:
    - containerPort: 8000
      name: http
    command: ["uvicorn"]
    args: ["main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env:
      - name: mysql-user 
        valueFrom:
          secretKeyRef:
            name: mysql-user
            key: mysql-user 
      - name: mysql-password 
        valueFrom:
          secretKeyRef:
            name: mysql-password
            key: mysql-password 
      - name: mysql-host 
        valueFrom:
          secretKeyRef:
            name: mysql-host
            key: mysql-host 
      - name: mysql-port 
        valueFrom:
          secretKeyRef:
            name: mysql-port
            key: mysql-port 
      - name: mysql-database 
        valueFrom:
          secretKeyRef:
            name: mysql-database
            key: mysql-database 
