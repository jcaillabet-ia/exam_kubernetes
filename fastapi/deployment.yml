apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: eval
  labels:
    app: fastapi
spec:
  selector:
    matchLabels:
      app: fastapi
  replicas: 3
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: jcaillabet/k8s-dst-eval-fastapi:latest
          imagePullPolicy: Always
          command: ["uvicorn"]
          args: ["main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: mysql-user
            - secretRef:
                name: mysql-password
            - secretRef:
                name: mysql-port
            - secretRef:
                name: mysql-database
            - secretRef:
                name: mysql-host